<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.14" />
      <stop offset="55%" stop-color="currentColor" stop-opacity="0.07" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Medical crosses scattered top-left -->
  <g fill="currentColor" opacity="0.5">
    <path d="M 60 60 h 40 v 40 h 40 v 40 h -40 v 40 h -40 v -40 h -40 v -40 h 40 z" />
    <path d="M 260 160 h 28 v 28 h 28 v 28 h -28 v 28 h -28 v -28 h -28 v -28 h 28 z" />
    <path d="M 120 320 h 34 v 34 h 34 v 34 h -34 v 34 h -34 v -34 h -34 v -34 h 34 z" />
  </g>

  <!-- Capsule / pill shapes -->
  <g opacity="0.55">
    <g transform="translate(1180 130) rotate(35)">
      <rect x="-50" y="-18" width="100" height="36" rx="18" fill="none" stroke="currentColor" stroke-width="2" />
      <line x1="0" y1="-18" x2="0" y2="18" stroke="currentColor" stroke-width="2" />
    </g>
    <g transform="translate(1380 260) rotate(-20)">
      <rect x="-40" y="-15" width="80" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="currentColor" stroke-width="2" />
    </g>
    <g transform="translate(220 680) rotate(-15)">
      <rect x="-45" y="-16" width="90" height="32" rx="16" fill="none" stroke="currentColor" stroke-width="2" />
      <line x1="0" y1="-16" x2="0" y2="16" stroke="currentColor" stroke-width="2" />
    </g>
    <g transform="translate(1460 780) rotate(25)">
      <rect x="-42" y="-15" width="84" height="30" rx="15" fill="none" stroke="currentColor" stroke-width="2" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="currentColor" stroke-width="2" />
    </g>
  </g>

  <!-- Cross accents bottom-right -->
  <g fill="currentColor" opacity="0.45">
    <path d="M 1420 900 h 24 v 24 h 24 v 24 h -24 v 24 h -24 v -24 h -24 v -24 h 24 z" />
    <path d="M 1520 840 h 32 v 32 h 32 v 32 h -32 v 32 h -32 v -32 h -32 v -32 h 32 z" />
  </g>

  <!-- Hexagonal molecule cluster (right side) -->
  <g transform="translate(1300 650)">
    <g stroke="currentColor" stroke-width="1" opacity="0.5" fill="none">
      <path d="M 0 -40 L 35 -20 L 35 20 L 0 40 L -35 20 L -35 -20 Z" />
      <path d="M 35 -20 L 75 -30" />
      <path d="M 35 20 L 75 35" />
      <path d="M -35 -20 L -70 -35" />
    </g>
    <g fill="currentColor" opacity="0.65">
      <circle cx="0" cy="-40" r="4" />
      <circle cx="35" cy="-20" r="4" />
      <circle cx="35" cy="20" r="4" />
      <circle cx="0" cy="40" r="4" />
      <circle cx="-35" cy="20" r="4" />
      <circle cx="-35" cy="-20" r="4" />
      <circle cx="75" cy="-30" r="3.5" />
      <circle cx="75" cy="35" r="3.5" />
      <circle cx="-70" cy="-35" r="3.5" />
    </g>
  </g>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#fade)" />
</svg>
